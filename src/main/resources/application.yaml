server:
  port: 3003
spring:
  application:
    name: estacionapark
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

flyway:
  enabled: true

garage:
  client:
    base:
      url: http://localhost:3000